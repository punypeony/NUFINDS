<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NU Finds</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="../css/login.css">
  <link rel="stylesheet" href="../css/login-popup.css">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <img src="../assets/images/nufindslogo white.png" alt="NU Finds White Logo" class="logo-header">
    </div>

    <section class="hero">
      <div class="left-content">
        <div class="logo-title">
          <img src="../assets/images/nufindslogo blue.png" alt="NU Finds Blue Logo" class="logo-hero">
          <p>What's Lost Finds Its Way</p>
        </div>

        <div class="login-box">
          <h2 id="login-heading">Welcome!</h2>
          <div class="subtitle" id="login-subtitle">Enter your email and password.</div>

          <form action="../database/php/auth/Auth.php" method="post" class="login-form"
                data-student-home-url="student/home.html"
                data-admin-home-url="admin/home.html"
                data-check-email-url="../database/php/auth/check_admin_email.php">
            <input type="hidden" name="LoginType" id="login-type" value="student">

            <div class="input-group">
              <i class="fa-solid fa-envelope"></i>
              <input type="email" name="StudentEmail" id="login-email" placeholder="Email" required autocomplete="email">
            </div>

            <div class="input-group" id="student-password-group">
              <i class="fa-solid fa-lock"></i>
              <input type="password" name="StudentPassword" id="student-password" placeholder="Password" required autocomplete="current-password">
            </div>

            <div class="input-group hidden" id="admin-password-group" hidden>
              <i class="fa-solid fa-lock"></i>
              <input type="password" name="AdminPassword" id="admin-password" placeholder="Admin Password" autocomplete="off">
            </div>

            <button type="submit" class="submit-btn">Submit</button>
          </form>

          <p class="auth-link">Don't have an account? <a href="register.html">Register</a></p>
          <div class="footer-text" id="login-footer">For Nationalians use only.</div>
        </div>
      </div>

      <div class="building"></div>
    </section>
  </div>

  <div id="popup-overlay" class="popup hidden">
    <div class="popup-content" id="popup-content">
      <h2 id="popup-title">Message</h2>
      <p id="popup-message"></p>
      <button type="button" id="popup-ok">OK</button>
    </div>
  </div>

  <script src="../js/login-form.js"></script>
</body>
</html>
