<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NU Finds</title>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <link rel="stylesheet" href="../css/login.css">
</head>

<body>

  <div class="container">

    <div class="topbar">
      <img src="../assets/images/nu-logo.png" alt="NU logo" class="logo-img">
      <span class="site-title">NU Finds</span>
    </div>

    <section class="hero">

      <div class="left-content">

        <div class="logo-title">
          <h1>
            <span class="blue">NU</span><span class="yellow">Finds</span>
          </h1>
          <p>What’s Lost Finds Its Way</p>
        </div>

        <!-- FORM -->
        <div class="login-box">

          <h2>Welcome!</h2>
          <div class="subtitle">Please enter your details.</div>

          <div class="input-group">
            <i class="fa-solid fa-graduation-cap"></i>
            <select id="department-select">
              <option value="" disabled selected>Select College Department</option>
            </select>
          </div>

          <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" placeholder="Name">
          </div>

          <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="text" placeholder="Student Number">
          </div>

          <button class="submit-btn">Submit</button>

          <div class="footer-text">
            For Nationalians use only.
          </div>

        </div>
      </div>

      <!-- RIGHT IMAGE -->
      <div class="building"></div>

    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
