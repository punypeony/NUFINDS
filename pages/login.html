<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NU Finds</title>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="../css/login.css">
  <style>
    .popup { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.45); z-index: 9999; }
    .popup.hidden { display: none; }
    .popup-content { background: white; padding: 1.5rem; border-radius: 14px; width: min(95%, 420px); text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); border-top: 5px solid transparent; }
    .popup-content.success { border-top-color: #f2c100; }
    .popup-content.error { border-top-color: #b00020; }
    .popup-content h2 { margin-bottom: 1rem; color: #25358c; }
    .popup-content.success h2 { color: #25358c; }
    .popup-content.error h2 { color: #b00020; }
    .popup-content p { margin-bottom: 1.25rem; color: #333; }
    .popup-content button { background: #25358c; color: #f2c100; border: none; border-radius: 10px; padding: 0.75rem 1.25rem; cursor: pointer; }
    .popup-content button:hover { background: #1a2563; }
  </style>
</head>

<body>

  <div class="container">

    <div class="topbar">
      <img src="../assets/images/nufindslogo white.png" alt="NU Finds White Logo" class="logo-header">
    </div>

    <section class="hero">

      <div class="left-content">

        <div class="logo-title">
          <img src="../assets/images/nufindslogo blue.png" alt="NU Finds Blue Logo" class="logo-hero">
          <p>What’s Lost Finds Its Way</p>
        </div>

        <!-- FORM -->
        <div class="login-box">

          <h2>Welcome!</h2>
          <div class="subtitle">Please enter your details.</div>

          <form action="../database/php/login_auth.php" method="post" class="login-form">
            <div class="input-group">
              <i class="fa-solid fa-graduation-cap"></i>
              <select id="department-select" name="CollegeDepartment" required>
                <option value="" disabled selected>Select College Department</option>
              </select>
            </div>

            <div class="input-group">
              <i class="fa-solid fa-envelope"></i>
              <input type="email" name="StudentEmail" placeholder="Student Email" required>
            </div>

            <div class="input-group">
              <i class="fa-solid fa-lock"></i>
              <input type="text" name="StudentNumber" placeholder="Student Number" required>
            </div>

            <button type="submit" class="submit-btn">Submit</button>
          </form>

          <div class="footer-text">
            For Nationalians use only.
          </div>

        </div>
      </div>

      <!-- RIGHT IMAGE -->
      <div class="building"></div>

    </section>

  </div>

  <script src="../js/script.js"></script>

  <div id="popup-overlay" class="popup hidden">
    <div class="popup-content" id="popup-content">
      <h2 id="popup-title">Message</h2>
      <p id="popup-message"></p>
      <button id="popup-ok">OK</button>
    </div>
  </div>

  <script>
    function showPopup(type, message) {
      if (!message) return;
      const overlay = document.getElementById('popup-overlay');
      const title = document.getElementById('popup-title');
      const content = document.getElementById('popup-content');
      title.textContent = type === 'success' ? 'Success' : 'Error';
      content.classList.toggle('success', type === 'success');
      content.classList.toggle('error', type !== 'success');
      document.getElementById('popup-message').textContent = message;
      overlay.classList.remove('hidden');
    }

    document.addEventListener('DOMContentLoaded', function () {
      const loginForm = document.querySelector('.login-form');
      const popupOverlay = document.getElementById('popup-overlay');
      const popupOk = document.getElementById('popup-ok');

      loginForm.addEventListener('submit', async function (event) {
        event.preventDefault();
        const formData = new FormData(loginForm);

        try {
          const response = await fetch(loginForm.action, {
            method: 'POST',
            body: formData,
          });
          const result = await response.json();

          if (result.status === 'success') {
            showPopup('success', result.message || 'Login successful. Redirecting to home.');
            popupOk.onclick = function () {
              popupOverlay.classList.add('hidden');
              window.location.href = 'home.html';
            };
          } else {
            showPopup('error', result.message || 'Login failed. Please try again.');
            popupOk.onclick = function () {
              popupOverlay.classList.add('hidden');
            };
          }
        } catch (error) {
          showPopup('error', 'Unable to submit login. Please try again.');
          popupOk.onclick = function () {
            popupOverlay.classList.add('hidden');
          };
        }
      });
    });
  </script>
</body>
</html>
