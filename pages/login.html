<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NU Finds</title>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="../css/login.css">
  <style>
    .popup { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.45); z-index: 9999; }
    .popup.hidden { display: none; }
    .popup-content { background: white; padding: 1.5rem; border-radius: 14px; width: min(95%, 420px); text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    .popup-content h2 { margin-bottom: 1rem; color: #b00020; }
    .popup-content p { margin-bottom: 1.25rem; color: #333; }
    .popup-content button { background: #1f7a8c; color: white; border: none; border-radius: 10px; padding: 0.75rem 1.25rem; cursor: pointer; }
  </style>
</head>

<body>

  <div class="container">

    <div class="topbar">
      <img src="../assets/images/nu-logo.png" alt="NU logo" class="logo-img">
      <span class="site-title">NU Finds</span>
    </div>

    <section class="hero">

      <div class="left-content">

        <div class="logo-title">
          <h1>
            <span class="blue">NU</span><span class="yellow">Finds</span>
          </h1>
          <p>What’s Lost Finds Its Way</p>
        </div>

        <!-- FORM -->
        <div class="login-box">

          <h2>Welcome!</h2>
          <div class="subtitle">Please enter your details.</div>

          <form action="../database/php/login_auth.php" method="post" class="login-form">
            <div class="input-group">
              <i class="fa-solid fa-graduation-cap"></i>
              <select id="department-select" name="CollegeDepartment" required>
                <option value="" disabled selected>Select College Department</option>
              </select>
            </div>

            <div class="input-group">
              <i class="fa-solid fa-user"></i>
              <input type="text" name="StudentName" placeholder="Name" required>
            </div>

            <div class="input-group">
              <i class="fa-solid fa-lock"></i>
              <input type="text" name="StudentNumber" placeholder="Student Number" required>
            </div>

            <button type="submit" class="submit-btn">Submit</button>
          </form>

          <div class="footer-text">
            For Nationalians use only.
          </div>

        </div>
      </div>

      <!-- RIGHT IMAGE -->
      <div class="building"></div>

    </section>

  </div>

  <script src="../js/script.js"></script>

  <div id="error-popup" class="popup hidden">
    <div class="popup-content">
      <h2>Error</h2>
      <p id="popup-message"></p>
      <button id="popup-ok">OK</button>
    </div>
  </div>

  <script>
    function showErrorPopup(message) {
      if (!message) return;
      document.getElementById('popup-message').textContent = message;
      document.getElementById('error-popup').classList.remove('hidden');
    }

    document.addEventListener('DOMContentLoaded', function () {
      const params = new URLSearchParams(window.location.search);
      const error = params.get('error');
      if (error) {
        showErrorPopup(decodeURIComponent(error));
      }
      document.getElementById('popup-ok').addEventListener('click', function () {
        document.getElementById('error-popup').classList.add('hidden');
        history.replaceState(null, '', window.location.pathname);
      });
    });
  </script>
</body>
</html>
