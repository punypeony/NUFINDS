<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NU Finds - Report Lost Item</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      overflow-x:hidden;
      background:#f5f5f5;
    }

    .container{
      width:100%;
      min-height:100vh;
      position:relative;
    }

    .topbar{
      width:100%;
      height:50px;
      background:#25358c;
      border-bottom:4px solid #f2c100;
      display:flex;
      align-items:center;
      padding:0 25px;
      color:white;
      font-weight:bold;
      position:sticky;
      top:0;
      z-index:1000;
    }

    .logo-img{
      height:32px;
      margin-right:10px;
    }

    .site-title{
      font-size:20px;
    }

    .hero{
      width:100%;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px 80px;
      position:relative;
      overflow:hidden;
    }

    .building{
      position:absolute;
      right:0;
      bottom:0;
      width:65%;
      height:100%;
      background:
      linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.25)),
      url('nu bg.png') no-repeat center center/cover;

      background-blend-mode:lighten;
      clip-path:polygon(18% 0,100% 0,100% 100%,0 100%);
    }

    .main-container {
      width: 82%;
      max-width: 1100px;
      background: rgba(37,53,140,0.95);
      border-radius: 10px;
      padding: 35px 60px 45px;
      overflow: hidden;
      position:relative;
      z-index:2;
    }

    .main-container h2 {
      text-align: center;
      color: #ffd400;
      font-size: 42px;
      margin-bottom: 35px;
    }

    .input-row {
      display: flex;
      justify-content: space-between;
      gap: 30px;
      margin-bottom: 35px;
    }

    .input-box {
      flex: 1;
      position: relative;
    }

    .input-box img {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
    }

    .input-box input {
      width: 100%;
      padding: 16px 20px 16px 60px;
      border-radius: 40px;
      border: 4px solid #ffd400;
      background: transparent;
      color: white;
      font-size: 15px;
      outline: none;
    }

    .input-box input::placeholder {
      color: #d7d7d7;
      font-style: italic;
    }

    .section-title {
      color: #ffd400;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .category-container {
      background: rgba(255,255,255,0.35);
      width: fit-content;
      margin: auto;
      padding: 15px 25px;
      border-radius: 10px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 35px;
    }

    .category-btn {
      width: 110px;
      min-height: 100px;
      border: none;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      transition: 0.2s ease;
      padding: 8px;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;

      color: #1d3479;
      font-size: 12px;
      line-height: 1.1;
      font-weight: 500;
    }

    .category-btn:hover,
    .category-btn.active {
      transform: scale(1.05);
      border: 3px solid #ffd400;
    }

    .category-btn img {
      width: 42px;
      height: 42px;
      object-fit: contain;
      margin-bottom: 8px;
    }

    textarea {
      width: 80%;
      display: block;
      margin: auto;
      min-height: 110px;
      resize: none;
      border: none;
      border-radius: 10px;
      padding: 18px;
      background: rgba(255,255,255,0.4);
      color: white;
      font-size: 15px;
      outline: none;
    }

    textarea::placeholder {
      color: #ececec;
      font-style: italic;
    }

    .submit-btn {
      display: block;
      margin: 32px auto 0;
      padding: 14px 42px;
      border: none;
      border-radius: 35px;
      background: #ffd400;
      color: #1d3479;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .submit-btn:hover {
      transform: scale(1.05);
    }

    a {
      text-decoration: none;
    }

    .popup{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.45);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    .popup-content{
      width:350px;
      background:white;
      padding:35px 25px;
      border-radius:15px;
      text-align:center;
    }

    .popup-content h2{
      color:#25358c;
      margin-bottom:15px;
    }

    .popup-content p{
      color:#555;
      margin-bottom:25px;
      line-height:1.5;
    }

    .popup-content button{
      padding:12px 28px;
      border:none;
      border-radius:8px;
      background:#25358c;
      color:#f2c100;
      font-weight:bold;
      cursor:pointer;
    }

    @media (max-width: 900px) {
      .main-container {
        width: 92%;
        padding: 30px 20px;
      }

      .input-row {
        flex-direction: column;
      }

      textarea {
        width: 100%;
      }

      .main-container h2 {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="topbar">
    <img src="nu logo.png" alt="NU Logo" class="logo-img">
    <div class="site-title">NU Finds</div>
  </div>

<section class="hero">

<div class="building"></div>

<div class="main-container">

    <h2>Report a Found Item</h2>

    <div class="input-row">

      <div class="input-box">
        <img src="location.png" alt="Location Icon">
        <input type="text" placeholder="Location" required>
      </div>

      <div class="input-box">
        <img src="date.png" alt="Date Icon">
        <input type="date" required>
      </div>

    </div>

    <div class="section-title">Select a category</div>

    <div class="category-container">

      <button class="category-btn">
        <img src="wallet.png" alt="Wallet">
        <span>Wallet/Credit Card/Money</span>
      </button>

      <button class="category-btn">
        <img src="id.png" alt="ID">
        <span>Identity Document</span>
      </button>

      <button class="category-btn">
        <img src="bag.png" alt="Bag">
        <span>Bag</span>
      </button>

      <button class="category-btn">
        <img src="electronics.png" alt="Electronics">
        <span>Electronics/Gadgets</span>
      </button>

      <button class="category-btn">
        <img src="accessories.png" alt="Accessories">
        <span>Accessories</span>
      </button>

      <button class="category-btn">
        <img src="others.png" alt="Others">
        <span>Others</span>
      </button>

    </div>

    <div class="section-title">Describe your item</div>

    <textarea placeholder="Describe the object and its distinctive elements as well as possible. Do not indicate first name, last name, surname, address or number."></textarea>

    <button class="submit-btn" onclick="showPopup()">
      Submit
    </button>

  </div>

<!-- POPUP -->
<div class="popup" id="popup">

  <div class="popup-content">

    <h2>Report Submitted!</h2>

    <p>
      Your found item report has been successfully submitted.
    </p>

    <button onclick="closePopup()">
      OK
    </button>

  </div>

</div>

</div>

</section>

</div>

  <script>
    const buttons = document.querySelectorAll('.category-btn');

    buttons.forEach(button => {
      button.addEventListener('click', () => {
        buttons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
      });
    });

    function showPopup(){
      document.getElementById('popup').style.display = 'flex';
    }

    function closePopup(){
      document.getElementById('popup').style.display = 'none';
    }
  </script>

</body>
</html>
