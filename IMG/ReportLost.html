<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NU Finds - Report Lost Item</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background-color: #e9e9e9;
      min-height: 100vh;
    }

    .topbar {
      background-color: #2f3f92;
      height: 85px;
      display: flex;
      align-items: center;
      padding: 0 50px;
      border-bottom: 10px solid #ffd400;
    }

    .topbar img {
      width: 55px;
      margin-right: 18px;
    }

    .topbar h1 {
      color: white;
      font-size: 24px;
      font-weight: normal;
    }

    .main-container {
      width: 80%;
      max-width: 1100px;
      margin: 50px auto;
      background:
        linear-gradient(rgba(16, 55, 110, 0.9), rgba(16, 55, 110, 0.9)),
        url('nu bg.png');
      background-size: cover;
      background-position: center;
      border-radius: 10px;
      padding: 30px 60px 40px;
      position: relative;
      overflow: hidden;
    }

    .main-container h2 {
      text-align: center;
      color: #ffd400;
      font-size: 42px;
      margin-bottom: 35px;
    }

    .input-row {
      display: flex;
      justify-content: space-between;
      gap: 30px;
      margin-bottom: 35px;
    }

    .input-box {
      flex: 1;
      position: relative;
    }

    .input-box img {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
    }

    .input-box input {
      width: 100%;
      padding: 16px 20px 16px 60px;
      border-radius: 40px;
      border: 4px solid #ffd400;
      background: transparent;
      color: white;
      font-size: 15px;
      outline: none;
    }

    .input-box input::placeholder {
      color: #d7d7d7;
      font-style: italic;
    }

    .section-title {
      color: #ffd400;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .category-container {
      background: rgba(255,255,255,0.35);
      width: fit-content;
      margin: auto;
      padding: 15px 25px;
      border-radius: 10px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 35px;
    }

    .category-btn {
      width: 105px;
      min-height: 95px;
      border: none;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      transition: 0.2s ease;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #1d3479;
      font-size: 14px;
    }

    .category-btn:hover,
    .category-btn.active {
      transform: scale(1.05);
      border: 3px solid #ffd400;
    }

    .category-btn img {
      width: 42px;
      height: 42px;
      object-fit: contain;
      margin-bottom: 8px;
    }

    textarea {
      width: 80%;
      display: block;
      margin: auto;
      min-height: 110px;
      resize: none;
      border: none;
      border-radius: 10px;
      padding: 18px;
      background: rgba(255,255,255,0.4);
      color: white;
      font-size: 15px;
      outline: none;
    }

    textarea::placeholder {
      color: #ececec;
      font-style: italic;
    }

    .submit-btn {
      display: block;
      margin: 32px auto 0;
      padding: 14px 42px;
      border: none;
      border-radius: 35px;
      background: #ffd400;
      color: #1d3479;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .submit-btn:hover {
      transform: scale(1.05);
    }

    @media (max-width: 900px) {
      .main-container {
        width: 92%;
        padding: 30px 20px;
      }

      .input-row {
        flex-direction: column;
      }

      textarea {
        width: 100%;
      }

      .main-container h2 {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <img src="nu logo.png" alt="NU Logo">
    <h1>NU Finds</h1>
  </div>

  <div class="main-container">

    <h2>Report a Lost Item</h2>

    <div class="input-row">

      <div class="input-box">
        <img src="location.png" alt="Location Icon">
        <input type="text" placeholder="Location" required>
      </div>

      <div class="input-box">
        <img src="date.png" alt="Date Icon">
        <input type="date" required>
      </div>

    </div>

    <div class="section-title">Select a category</div>

    <div class="category-container">

      <button class="category-btn">
        <img src="wallet.png" alt="Wallet">
        <span>Wallet/Credit Card/Money</span>
      </button>

      <button class="category-btn">
        <img src="id.png" alt="ID">
        <span>Identity Document</span>
      </button>

      <button class="category-btn">
        <img src="bag.png" alt="Bag">
        <span>Bag</span>
      </button>

      <button class="category-btn">
        <img src="electronics.png" alt="Electronics">
        <span>Electronics/Gadgets</span>
      </button>

      <button class="category-btn">
        <img src="accessories.png" alt="Accessories">
        <span>Accessories</span>
      </button>

      <button class="category-btn">
        <img src="others.png" alt="Others">
        <span>Others</span>
      </button>

    </div>

    <div class="section-title">Describe your item</div>

    <textarea placeholder="Describe the object and its distinctive elements as well as possible. Do not indicate first name, last name, surname, address or number."></textarea>

    <button class="submit-btn">Submit</button>

  </div>

  <script>
    const buttons = document.querySelectorAll('.category-btn');

    buttons.forEach(button => {
      button.addEventListener('click', () => {
        buttons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
      });
    });
  </script>

</body>
</html>
